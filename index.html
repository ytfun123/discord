<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusChat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-app:#0f1117;--bg-sidebar:#1a1d27;--bg-channels:#161926;--bg-main:#13161f;--bg-input:#1e2130;
  --bg-hover:#252840;--bg-msg-own:#2d3561;--accent:#6c7cff;--accent-soft:#3d4699;
  --text-hi:#e8eaf6;--text-md:#9fa3c8;--text-lo:#5a5f80;--border:#2a2d42;
  --green:#3dd68c;--red:#f05252;--gold:#f5a623;--teal:#4ecdc4;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-app);color:var(--text-hi);font-size:14px;line-height:1.5;height:100vh;overflow:hidden}

/* ===== AUTH ===== */
#auth-screen{position:fixed;inset:0;background:var(--bg-app);display:flex;align-items:center;justify-content:center;z-index:1000}
.auth-box{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:16px;padding:36px;width:370px;display:flex;flex-direction:column;gap:18px}
.auth-logo{display:flex;align-items:center;gap:12px;justify-content:center}
.auth-logo-icon{width:46px;height:46px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#fff}
.auth-logo-name{font-size:22px;font-weight:700}
.auth-tabs{display:flex;border-bottom:1px solid var(--border)}
.auth-tab{flex:1;padding:10px;text-align:center;cursor:pointer;color:var(--text-lo);font-size:14px;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.auth-field{display:flex;flex-direction:column;gap:6px}
.auth-field label{font-size:11px;font-weight:600;color:var(--text-lo);text-transform:uppercase;letter-spacing:.06em}
.auth-field input{background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text-hi);font-size:14px;outline:none;transition:border-color .15s}
.auth-field input:focus{border-color:var(--accent)}
.auth-field input::placeholder{color:var(--text-lo)}
.auth-btn{background:var(--accent);border:none;color:#fff;border-radius:10px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
.auth-btn:hover{background:#7d8cff}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-error{background:#2a1515;border:1px solid var(--red);border-radius:8px;padding:10px 14px;color:#f87171;font-size:13px;display:none}
.auth-error.show{display:block}
.auth-note{text-align:center;font-size:12px;color:var(--text-lo)}

/* ===== APP ===== */
#app{display:none;height:100vh}
.app{display:flex;height:100vh}

/* ===== SERVER BAR ===== */
.server-bar{width:64px;background:#0d0f18;display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:6px;flex-shrink:0;overflow-y:auto}
.server-bar::-webkit-scrollbar{display:none}
.srv-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:border-radius .2s,opacity .15s;position:relative;flex-shrink:0;color:#fff}
.srv-icon:hover{border-radius:14px;opacity:.9}
.srv-icon.active{border-radius:14px}
.srv-pip{position:absolute;left:-4px;top:50%;transform:translateY(-50%);width:4px;background:var(--text-hi);border-radius:0 3px 3px 0;height:0;transition:height .15s}
.srv-icon:hover .srv-pip{height:8px}
.srv-icon.active .srv-pip{height:22px}
.srv-divider{width:32px;height:2px;background:var(--border);border-radius:2px;margin:2px 0;flex-shrink:0}

/* ===== CHANNEL SIDEBAR ===== */
.sidebar{width:220px;min-width:220px;background:var(--bg-channels);display:flex;flex-direction:column;border-right:1px solid var(--border)}
.sidebar-header{padding:14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.server-name{font-weight:700;font-size:14px;color:var(--text-hi)}
.sidebar-scroll{flex:1;overflow-y:auto;padding:8px 0}
.sidebar-scroll::-webkit-scrollbar{width:3px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.section-label{padding:5px 12px;font-size:10px;font-weight:700;color:var(--text-lo);text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.section-add{cursor:pointer;font-size:17px;color:var(--text-lo);transition:color .15s;line-height:1}
.section-add:hover{color:var(--accent)}
.ch-item{padding:6px 12px;cursor:pointer;border-radius:6px;margin:1px 6px;display:flex;align-items:center;gap:8px;transition:background .12s}
.ch-item:hover{background:var(--bg-hover)}
.ch-item.active{background:var(--accent-soft)}
.ch-item.active .ch-name,.ch-item.active .ch-ico{color:var(--text-hi)}
.ch-ico{font-size:14px;color:var(--text-lo);width:16px;text-align:center;flex-shrink:0}
.ch-name{color:var(--text-md);font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dm-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0;color:#fff;position:relative}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);position:absolute;bottom:0;right:0;border:2px solid var(--bg-channels)}
.sidebar-bottom{padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.my-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;flex-shrink:0;color:#fff;position:relative}
.my-dot{width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--bg-channels);position:absolute;bottom:0;right:0}
.my-info{flex:1;overflow:hidden;min-width:0}
.my-name{font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px;overflow:hidden}
.my-tag{font-size:10px;color:var(--text-lo)}
.role-badge{font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;text-transform:uppercase;flex-shrink:0}
.role-C{background:#fff3cd;color:#856404}
.role-A{background:#f8d7da;color:#721c24}
.role-M{background:#d1ecf1;color:#0c5460}
.icon-btn{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-lo);border:none;background:transparent;font-size:14px;transition:all .12s;flex-shrink:0}
.icon-btn:hover{background:var(--bg-hover);color:var(--text-hi)}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-header{padding:0 18px;height:50px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--bg-main)}
.hdr-icon{font-size:16px;color:var(--text-lo);flex-shrink:0}
.hdr-info{flex:1;min-width:0}
.hdr-name{font-weight:600;font-size:15px}
.hdr-desc{font-size:11px;color:var(--text-lo)}
.hdr-actions{display:flex;gap:4px;flex-shrink:0}
.call-btn{display:flex;align-items:center;gap:5px;background:var(--accent-soft);border:none;color:#aab3ff;border-radius:7px;padding:5px 12px;cursor:pointer;font-size:13px;font-weight:500;transition:background .15s}
.call-btn:hover{background:var(--accent)}
.call-btn.live{background:#1a3d1a;color:#6ee7b7}
.call-btn.live:hover{background:#1f4d22}

/* ===== MESSAGES ===== */
.msgs{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:1px;background:var(--bg-main)}
.msgs::-webkit-scrollbar{width:4px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.day-div{display:flex;align-items:center;gap:10px;margin:10px 0 6px;color:var(--text-lo);font-size:11px;font-weight:600;letter-spacing:.05em}
.day-div::before,.day-div::after{content:'';flex:1;height:1px;background:var(--border)}
.msg-row{display:flex;gap:10px;padding:3px 5px;border-radius:7px;transition:background .1s}
.msg-row:hover{background:rgba(255,255,255,.025)}
.msg-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin-top:1px;color:#fff}
.msg-body{flex:1;min-width:0}
.msg-hdr{display:flex;align-items:center;gap:6px;margin-bottom:2px;flex-wrap:wrap}
.msg-who{font-weight:600;font-size:13px}
.msg-num{font-size:10px;color:var(--text-lo)}
.msg-time{font-size:11px;color:var(--text-lo)}
.msg-txt{color:#cdd0eb;font-size:14px;line-height:1.55;word-break:break-word;white-space:pre-wrap}
.msg-own{flex-direction:row-reverse}
.msg-own .msg-hdr{flex-direction:row-reverse}
.msg-own .msg-txt{background:var(--bg-msg-own);border-radius:12px 3px 12px 12px;padding:7px 11px;display:inline-block;max-width:380px;float:right;clear:both}
.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--text-lo)}
.typing-bar{height:24px;padding:0 18px;display:flex;align-items:center;gap:7px;color:var(--text-lo);font-size:12px;flex-shrink:0;background:var(--bg-main)}
.tdots{display:flex;gap:3px;align-items:center}
.dot{width:4px;height:4px;border-radius:50%;background:var(--text-lo);animation:bop .9s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* ===== INPUT ===== */
.input-wrap{padding:8px 18px 12px;background:var(--bg-main);flex-shrink:0}
.input-box{background:var(--bg-input);border:1px solid var(--border);border-radius:12px;display:flex;align-items:flex-end;gap:6px;padding:8px 11px;transition:border-color .15s}
.input-box:focus-within{border-color:var(--accent)}
.msg-field{flex:1;background:transparent;border:none;outline:none;color:var(--text-hi);font-size:14px;resize:none;max-height:120px;min-height:22px;font-family:inherit;line-height:1.5}
.msg-field::placeholder{color:var(--text-lo)}
.send-btn{width:30px;height:30px;border-radius:7px;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:background .15s,opacity .15s;flex-shrink:0}
.send-btn:hover{background:#7d8cff}
.send-btn:disabled{opacity:.3;cursor:not-allowed}

/* ===== CALL OVERLAY ===== */
#call-overlay{position:fixed;inset:0;background:rgba(8,9,15,.97);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#call-overlay.on{display:flex}
.call-lbl{font-size:11px;color:var(--text-lo);text-transform:uppercase;letter-spacing:.1em}
.call-who{font-size:24px;font-weight:700}
.call-status-txt{font-size:13px;color:var(--text-md);min-height:20px}
.call-avs{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin:4px 0}
.call-av-wrap{display:flex;flex-direction:column;align-items:center;gap:5px}
.call-av{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;border:3px solid transparent;transition:all .3s;position:relative}
.call-av.speaking{border-color:var(--green);box-shadow:0 0 0 4px rgba(61,214,140,.15)}
.call-av .mutedbadge{position:absolute;bottom:1px;right:1px;width:18px;height:18px;border-radius:50%;background:var(--red);display:none;align-items:center;justify-content:center;font-size:9px;border:2px solid rgba(8,9,15,.97)}
.call-av.is-muted .mutedbadge{display:flex}
.call-av-name{font-size:10px;color:var(--text-lo);text-align:center;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.call-ctrls{display:flex;gap:12px;margin-top:4px}
.ccbtn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:19px;transition:opacity .15s,transform .1s}
.ccbtn:hover{opacity:.85;transform:scale(1.06)}
.ccbtn.gray{background:#252840;color:var(--text-hi)}
.ccbtn.on{background:var(--red);color:#fff}
.ccbtn.red-bg{background:var(--red);color:#fff}

/* ===== MODALS ===== */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;display:none;align-items:center;justify-content:center}
.modal.on{display:flex}
.mbox{background:#1c1f2e;border:1px solid var(--border);border-radius:16px;padding:22px;width:370px;display:flex;flex-direction:column;gap:13px;max-height:80vh;overflow-y:auto}
.mtitle{font-size:15px;font-weight:700}
.msub{font-size:12px;color:var(--text-lo)}
.minput{background:var(--bg-app);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text-hi);font-size:14px;outline:none;width:100%;font-family:inherit}
.minput:focus{border-color:var(--accent)}
.mactions{display:flex;gap:10px;justify-content:flex-end}
.mbtn{border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:500;border:none}
.mbtn.cancel{background:transparent;border:1px solid var(--border);color:var(--text-md)}
.mbtn.ok{background:var(--accent);color:#fff;font-weight:600}
.mbtn.ok:hover{background:#7d8cff}
.type-row{display:flex;gap:8px}
.topt{flex:1;padding:8px;border:1px solid var(--border);border-radius:8px;cursor:pointer;text-align:center;font-size:13px;color:var(--text-md);transition:all .15s}
.topt.sel{border-color:var(--accent);background:var(--accent-soft);color:#aab3ff}
.user-list{max-height:190px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.urow{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .12s}
.urow:hover{background:var(--bg-hover)}
.urow.sel{border-color:var(--accent);background:var(--accent-soft)}

/* ===== SYNC STATUS ===== */
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-lo);flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:var(--green)}
.sync-dot.err{background:var(--red)}
.sync-dot.syncing{background:var(--gold);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:20px;right:20px;background:#1e2130;border:1px solid var(--border);border-radius:10px;padding:10px 15px;font-size:13px;z-index:999;opacity:0;transform:translateY(6px);transition:all .22s;pointer-events:none;max-width:280px}
.toast.on{opacity:1;transform:translateY(0)}
.toast.err{border-color:var(--red);color:#f87171}
.toast.ok{border-color:var(--green);color:#6ee7b7}
</style>
</head>

<!-- ===== CALL OVERLAY ===== -->

<!-- ===== CREATE CHANNEL MODAL ===== -->

<!-- ===================== JAVASCRIPT ===================== -->
<script>
// ===================================================
//  STATE
// ===================================================
let me = null, token = null;
let channels = [], allUsers = [], myDMs = [];
let active = null;
let view = 'global'; // 'global' | 'server' | 'dm'
let pollTimer = null, syncTimer = null;
let newChType = 'text', selectedUser = null;

// Call
let inCall = false, muted = false, speakerOff = false;
let localStream = null, peers = {}, callTimer = null, callSecs = 0, callId = null;
let signalPollTimer = null;
const ICE_SERVERS = [
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun2.l.google.com:19302'}
];

// ===================================================
//  SUPABASE API
// ===================================================
async function rpc(fn, params={}) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    },
    body: JSON.stringify(params)
  });
  const txt = await r.text();
  let d;
  try { d = JSON.parse(txt); } catch(e) { throw new Error('Bad response: ' + txt.slice(0,100)); }
  if (!r.ok) throw new Error(d.message || d.error || JSON.stringify(d));
  return d;
}

async function dbGet(table, q='') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${q}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!r.ok) throw new Error('DB get failed: ' + r.status);
  return r.json();
}

async function dbPost(table, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(body)
  });
  const d = await r.json();
  if (!r.ok) throw new Error(d.message || JSON.stringify(d));
  return d;
}

// ===================================================
//  GOOGLE SHEETS SYNC
// ===================================================
function setSyncDot(state) {
  // state: 'idle' | 'syncing' | 'ok' | 'err'
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot' + (state !== 'idle' ? ' ' + state : '');
  dot.title = {
    idle: 'Google Sheets: not configured',
    syncing: 'Syncing to Google Sheets…',
    ok: 'Synced to Google Sheets ✓',
    err: 'Google Sheets sync failed'
  }[state] || '';
}

async function syncToSheet(userData) {
  if (!GSCRIPT_URL) { setSyncDot('idle'); return; }
  setSyncDot('syncing');
  try {
    await fetch(GSCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors', // Google Apps Script requires this from browser
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'sync_user',
        sheet_id: SHEET_ID,
        user: userData || {
          id: me.id,
          join_number: me.join_number,
          username: me.username,
          avatar_color: me.avatar_color,
          role: me.role || '',
          status: 'online',
          created_at: me.created_at || new Date().toISOString(),
          last_seen: new Date().toISOString()
        }
      })
    });
    // no-cors means we can't read response, so assume ok
    setSyncDot('ok');
    setTimeout(() => setSyncDot('idle'), 4000);
  } catch(e) {
    setSyncDot('err');
    console.warn('Sheet sync failed:', e.message);
  }
}

// Sync every 5 minutes while logged in to keep last_seen fresh
function startSyncTimer() {
  if (syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(() => syncToSheet(), 5 * 60 * 1000);
}

// ===================================================
//  AUTH
// ===================================================
let authMode = 'login';

function switchTab(m) {
  authMode = m;
  document.querySelectorAll('.auth-tab').forEach((t,i) =>
    t.classList.toggle('active', (i===0) === (m==='login')));
  document.getElementById('confirm-wrap').style.display = m==='register' ? 'flex' : 'none';
  document.getElementById('auth-btn').textContent = m==='login' ? 'Sign in' : 'Create account';
  document.getElementById('auth-error').classList.remove('show');
}

function showAuthErr(msg) {
  const e = document.getElementById('auth-error');
  e.textContent = msg;
  e.classList.add('show');
}

async function submitAuth() {
  const u = document.getElementById('au').value.trim();
  const p = document.getElementById('ap').value;
  const c = document.getElementById('ac').value;
  document.getElementById('auth-error').classList.remove('show');

  if (!u || !p) return showAuthErr('Fill in all fields');
  if (u.length < 3) return showAuthErr('Username must be at least 3 characters');
  if (p.length < 6) return showAuthErr('Password must be at least 6 characters');
  if (authMode === 'register' && p !== c) return showAuthErr('Passwords do not match');

  const btn = document.getElementById('auth-btn');
  btn.disabled = true;
  btn.textContent = authMode === 'login' ? 'Signing in…' : 'Creating account…';

  try {
    const fn = authMode === 'login' ? 'login_user' : 'register_user';
    const res = await rpc(fn, { p_username: u, p_password: p });
    if (res && res.error) return showAuthErr(res.error);

    me = res.user;
    token = res.token;
    localStorage.setItem('nc_token', token);
    localStorage.setItem('nc_user', JSON.stringify(me));

    // Sync to Google Sheets right after login/register
    await syncToSheet();
    await bootApp();
  } catch(e) {
    showAuthErr('Connection failed: ' + e.message);
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Sign in' : 'Create account';
  }
}

async function tryAutoLogin() {
  const t = localStorage.getItem('nc_token');
  if (!t) return;
  try {
    const r = await rpc('validate_session', { p_token: t });
    if (r && r.error) { localStorage.clear(); return; }
    me = r.user;
    token = t;
    // Update last_seen in sheet
    await syncToSheet();
    await bootApp();
  } catch(e) {
    localStorage.clear();
  }
}

function logout() {
  localStorage.clear();
  me = null; token = null;
  clearInterval(pollTimer);
  clearInterval(syncTimer);
  if (inCall) endCall();
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// ===================================================
//  BOOT
// ===================================================
async function bootApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Set avatar
  const avEl = document.getElementById('my-av');
  avEl.style.background = me.avatar_color;
  avEl.textContent = me.username.slice(0,2).toUpperCase();
  avEl.innerHTML += `<div class="my-dot"></div>`;

  // Set name + role badge
  const nameEl = document.getElementById('my-name-el');
  const badgeHTML = me.role ? ` <span class="role-badge role-${me.role}">${roleName(me.role)}</span>` : '';
  nameEl.innerHTML = escH(me.username) + badgeHTML;

  // Set join number
  document.getElementById('my-tag-el').textContent =
    me.join_number ? `#${me.join_number} · Online` : 'Online';

  // Load server data
  channels = await dbGet('channels', '?order=created_at.asc');
  await loadAllUsers();

  // Load saved DMs from localStorage
  myDMs = JSON.parse(localStorage.getItem('nc_dms') || '[]');

  // Start at global chat
  goGlobal();

  // Start polling for messages
  pollTimer = setInterval(poll, POLL_MS);

  // Start sheet sync timer
  startSyncTimer();
}

async function loadAllUsers() {
  try {
    const r = await rpc('get_users', { p_token: token });
    if (Array.isArray(r)) allUsers = r;
  } catch(e) {}
}

function openSheetLink() {
  window.open(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`, '_blank');
}

// ===================================================
//  VIEWS / NAVIGATION
// ===================================================
function goGlobal() {
  view = 'global';
  document.getElementById('srv-global').classList.add('active');
  document.getElementById('srv-main').classList.remove('active');
  document.getElementById('server-title').textContent = '🌐 Global';
  active = { type:'global', name:'Global Chat', icon:'🌐', desc:'Everyone is here' };
  renderSidebar();
  updateHeader();
  loadMsgs();
}

function goServer() {
  view = 'server';
  document.getElementById('srv-main').classList.add('active');
  document.getElementById('srv-global').classList.remove('active');
  document.getElementById('server-title').textContent = '💬 NexusChat';
  // Pick general or first channel
  if (!active || active.type === 'global') {
    const g = channels.find(c => c.name === 'general') || channels[0];
    if (g) active = { type:'channel', id:g.id, name:g.name, desc:g.description||'', icon:g.type==='voice'?'🔊':'#' };
  }
  renderSidebar();
  updateHeader();
  loadMsgs();
}

function goChannel(id, name, desc, type) {
  view = 'server';
  active = { type:'channel', id, name, desc, icon: type==='voice' ? '🔊' : '#' };
  document.getElementById('srv-main').classList.add('active');
  document.getElementById('srv-global').classList.remove('active');
  document.getElementById('server-title').textContent = '💬 NexusChat';
  renderSidebar();
  updateHeader();
  loadMsgs();
}

function goDM(userId, username, color) {
  view = 'dm';
  active = { type:'dm', id:'dm-'+userId, userId, name:username, icon:'💬', desc:'Direct message', color };
  document.getElementById('srv-global').classList.remove('active');
  document.getElementById('srv-main').classList.remove('active');
  document.getElementById('server-title').textContent = '💬 Messages';
  renderSidebar();
  updateHeader();
  loadMsgs();
}

function updateHeader() {
  if (!active) return;
  document.getElementById('hdr-icon').textContent = active.icon;
  document.getElementById('hdr-name').textContent = active.name;
  document.getElementById('hdr-desc').textContent = active.desc || '';
  const placeholder = active.type === 'dm'
    ? `Message ${active.name}…`
    : active.type === 'global'
      ? 'Message everyone…'
      : `Message #${active.name}…`;
  document.getElementById('msg-in').placeholder = placeholder;
}

// ===================================================
//  SIDEBAR RENDER
// ===================================================
function renderSidebar() {

  const dmItems = myDMs.map(u => `

      <div class="ch-item${active?.id===c.id?' active':''}"
        onclick="goChannel('${esc(c.id)}','${esc(c.name)}','${esc(c.description||'')}','${c.type}')">
        <span class="ch-ico">🔊</span>
        <span class="ch-name">${escH(c.name)}</span>
      </div>`).join('');

    el.innerHTML = `
      <div class="section-label">

      </div>
      ${textChs}
      ${voiceChs ? `<div class="section-label" style="margin-top:8px">Voice Channels</div>${voiceChs}` : ''}
      <div class="section-label" style="margin-top:16px">
        Direct Messages
        <span class="section-add" onclick="openModal('dm')" title="New DM">+</span>

// ===================================================
//  MESSAGES
// ===================================================
async function loadMsgs() {
  document.getElementById('msgs').innerHTML =
    `<div class="empty-chat"><div style="font-size:26px">💬</div><div style="font-size:13px">Loading…</div></div>`;
  try {
    renderMsgs(await fetchMsgs() || []);
  } catch(e) {
    showToast('Failed to load messages', 'err');
    console.error(e);
  }
}

async function fetchMsgs() {
  if (!active) return [];
  if (active.type === 'global') return rpc('get_global_messages', { p_token: token });
  if (active.type === 'channel') return rpc('get_channel_messages', { p_token: token, p_channel_id: active.id });
  return rpc('get_direct_messages', { p_token: token, p_other_user_id: active.userId });
}

function roleName(r) {
  return { C:'Creator', A:'Admin', M:'Mod' }[r] || r;
}

function roleBadge(role) {
  if (!role) return '';
  return `<span class="role-badge role-${role}">${roleName(role)}</span>`;
}

function renderMsgs(msgs) {
  const el = document.getElementById('msgs');
  if (!msgs || !msgs.length) {
    el.innerHTML = `<div class="empty-chat"><div style="font-size:34px">💬</div><div>No messages yet — say hello!</div></div>`;
    return;
  }

  let h = `<div style="flex:1"></div><div class="day-div">Today</div>`;

  msgs.forEach(m => {
    const isMe = m.sender.id === me.id;
    const ini = m.sender.username.slice(0,2).toUpperCase();
    const t = new Date(m.created_at).toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
    const av = `<div class="msg-av" style="background:${m.sender.avatar_color}">${ini}</div>`;
    const badge = roleBadge(m.sender.role);
    const numTag = m.sender.join_number
      ? `<span class="msg-num">#${m.sender.join_number}</span>`
      : '';

    if (isMe) {
      h += `<div class="msg-row msg-own">${av}<div class="msg-body">
        <div class="msg-hdr">
          <span class="msg-who" style="color:var(--accent)">You</span>
          ${badge}
          <span class="msg-time">${t}</span>
        </div>
        <div><span class="msg-txt">${escH(m.content)}</span></div>
      </div></div>`;
    } else {
      h += `<div class="msg-row">${av}<div class="msg-body">
        <div class="msg-hdr">
          <span class="msg-who" style="color:${m.sender.avatar_color}">${escH(m.sender.username)}</span>
          ${numTag}${badge}
          <span class="msg-time">${t}</span>
        </div>
        <div class="msg-txt">${escH(m.content)}</div>
      </div></div>`;
    }
  });

  el.innerHTML = h;
  el.scrollTop = el.scrollHeight;
}

async function poll() {
  if (!active || !token) return;
  try { renderMsgs(await fetchMsgs() || []); } catch(e) {}
}

async function sendMsg() {
  const inp = document.getElementById('msg-in');
  const txt = inp.value.trim();
  if (!txt || !token) return;

  inp.value = '';
  inp.style.height = '';
  document.getElementById('send-btn').disabled = true;

  try {
    if (active.type === 'global') {
      await rpc('send_global_message', { p_token: token, p_content: txt });
    } else if (active.type === 'channel') {
      await rpc('send_channel_message', { p_token: token, p_channel_id: active.id, p_content: txt });
    } else {
      await rpc('send_direct_message', { p_token: token, p_receiver_id: active.userId, p_content: txt });
    }
    renderMsgs(await fetchMsgs() || []);
  } catch(e) {
    showToast('Failed to send message', 'err');
    inp.value = txt;
  }
}

// ===================================================
//  MODALS
// ===================================================
function openModal(type) {
  if (type === 'channel') {
    document.getElementById('ch-name-in').value = '';
    document.getElementById('ch-modal').classList.add('on');
    setTimeout(() => document.getElementById('ch-name-in').focus(), 80);
  } else {
    selectedUser = null;
    document.getElementById('dm-search').value = '';
    filterUsers('');
    document.getElementById('dm-modal').classList.add('on');
    setTimeout(() => document.getElementById('dm-search').focus(), 80);
  }
}

function closeModal(id) {
  document.getElementById(id).classList.remove('on');
}

function setChType(t, el) {
  newChType = t;
  document.querySelectorAll('.topt').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
}

async function submitChModal() {
  const raw = document.getElementById('ch-name-in').value.trim();
  if (!raw) return showToast('Enter a channel name', 'err');
  const name = raw.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  if (!name) return showToast('Invalid channel name', 'err');
  try {
    const [ch] = await dbPost('channels', {
      name, type: newChType, description: raw, created_by: me.id
    });
    channels.push(ch);
    closeModal('ch-modal');
    goChannel(ch.id, ch.name, ch.description, ch.type);
    showToast(`#${ch.name} created!`, 'ok');
  } catch(e) {
    showToast(e.message || 'Failed to create channel', 'err');
  }
}

function filterUsers(q) {
  // Exclude users already in DM list? No — let them re-open existing ones
  const filtered = q
    ? allUsers.filter(u => u.username.toLowerCase().includes(q.toLowerCase()))
    : allUsers;

  document.getElementById('user-list').innerHTML = filtered.length
    ? filtered.map(u => `
        <div class="urow${selectedUser?.id===u.id?' sel':''}"
          onclick="selectUser('${esc(u.id)}','${esc(u.username)}','${esc(u.avatar_color||'#6c7cff')}')">
          <div class="dm-av" style="background:${u.avatar_color||'#6c7cff'};width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff">
            ${u.username.slice(0,2).toUpperCase()}
          </div>
          <span style="flex:1;font-size:13px">${escH(u.username)}</span>
          ${u.join_number ? `<span style="font-size:11px;color:var(--text-lo)">#${u.join_number}</span>` : ''}
          ${u.role ? `<span class="role-badge role-${u.role}">${u.role}</span>` : ''}
        </div>`).join('')
    : '<div style="color:var(--text-lo);font-size:13px;padding:8px 10px">No users found</div>';
}

function selectUser(id, username, color) {
  selectedUser = { id, username, color };
  filterUsers(document.getElementById('dm-search').value);
}

function submitDmModal() {
  if (!selectedUser) return showToast('Select a user first', 'err');
  // Add to DM list if not already there
  if (!myDMs.find(u => u.id === selectedUser.id)) {
    myDMs.push(selectedUser);
    localStorage.setItem('nc_dms', JSON.stringify(myDMs));
  }
  closeModal('dm-modal');
  goDM(selectedUser.id, selectedUser.username, selectedUser.color);
}

// ===================================================
//  WebRTC VOICE CALLS
// ===================================================
async function toggleCall() {
  if (inCall) endCall();
  else startCall();
}

async function startCall() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    document.getElementById('local-audio').srcObject = localStream;
  } catch(e) {
    showToast('Microphone access denied — please allow mic access', 'err');
    return;
  }

  inCall = true;
  callId = 'call-' + (
    active.type === 'dm'
      ? [me.id, active.userId].sort().join('-')
      : (active.id || 'global')
  );

  updateCallBtn();
  showCallOverlay();

  try {
    await dbPost('call_signals', {
      call_id: callId,
      type: 'call-start',
      from_user: me.id
    });
  } catch(e) {}

  document.getElementById('call-status').textContent = 'Waiting for others to join…';
  callSecs = 0;
  callTimer = setInterval(() => {
    callSecs++;
    document.getElementById('call-status').textContent = fmtTime(callSecs);
  }, 1000);

  pollSignals();
}

async function insertSig(data) {
  try {
    await dbPost('call_signals', { call_id: callId, ...data });
  } catch(e) { console.warn('Signal insert failed:', e.message); }
}

async function pollSignals() {
  if (signalPollTimer) clearInterval(signalPollTimer);
  signalPollTimer = setInterval(async () => {
    if (!inCall) { clearInterval(signalPollTimer); return; }
    try {
      const sigs = await dbGet('call_signals', `?call_id=eq.${callId}&order=created_at.asc&limit=50`);
      if (!Array.isArray(sigs)) return;
      for (const s of sigs) {
        if (s.from_user === me.id) continue;
        if (s.type === 'call-join') await handlePeerJoin(s.from_user);
        if (s.type === 'offer' && s.to === me.id) await handleOffer(s);
        if (s.type === 'answer' && s.to === me.id) await handleAnswer(s);
        if (s.type === 'ice' && s.to === me.id) await handleIce(s);
        if (s.type === 'call-end') endCall();
      }
    } catch(e) {}
  }, 1500);
}

async function handlePeerJoin(pid) {
  if (!peers[pid]) {
    addCallAvatar(pid);
    await createOfferTo(pid);
  }
}

async function createOfferTo(pid) {
  const pc = createPC(pid);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await insertSig({ type:'offer', from_user:me.id, to:pid, sdp:JSON.stringify(offer) });
}

async function handleOffer(s) {
  const pc = createPC(s.from_user);
  await pc.setRemoteDescription(JSON.parse(s.sdp));
  const ans = await pc.createAnswer();
  await pc.setLocalDescription(ans);
  await insertSig({ type:'answer', from_user:me.id, to:s.from_user, sdp:JSON.stringify(ans) });
}

async function handleAnswer(s) {
  const pc = peers[s.from_user];
  if (pc) await pc.setRemoteDescription(JSON.parse(s.sdp));
}

async function handleIce(s) {
  const pc = peers[s.from_user];
  if (pc) try { await pc.addIceCandidate(JSON.parse(s.candidate)); } catch(e) {}
}

function createPC(pid) {
  if (peers[pid]) return peers[pid];
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  peers[pid] = pc;

  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.onicecandidate = async (e) => {
    if (e.candidate) {
      await insertSig({ type:'ice', from_user:me.id, to:pid, candidate:JSON.stringify(e.candidate) });
    }
  };

  pc.ontrack = (e) => {
    let audio = document.getElementById('ra-' + pid);
    if (!audio) {
      audio = document.createElement('audio');
      audio.id = 'ra-' + pid;
      audio.autoplay = true;
      audio.playsinline = true;
      document.getElementById('remote-audios').appendChild(audio);
    }
    audio.srcObject = e.streams[0];
    addCallAvatar(pid);
    document.getElementById('call-status').textContent = fmtTime(callSecs);
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed') {
      showToast('Connection to peer failed', 'err');
    }
  };

  return pc;
}

function addCallAvatar(uid) {
  if (document.getElementById('cav-' + uid)) return;
  const u = allUsers.find(u => u.id === uid) || { username:'User', avatar_color:'#555' };
  const wrap = document.createElement('div');
  wrap.className = 'call-av-wrap';
  wrap.innerHTML = `
    <div class="call-av" id="cav-${uid}" style="background:${u.avatar_color}">
      ${u.username.slice(0,2).toUpperCase()}
      <div class="mutedbadge">🔇</div>
    </div>
    <div class="call-av-name">${escH(u.username)}</div>`;
  document.getElementById('call-avs').appendChild(wrap);
}

function showCallOverlay() {
  document.getElementById('call-who').textContent = active.name;
  document.getElementById('call-avs').innerHTML = `
    <div class="call-av-wrap">
      <div class="call-av speaking" id="cav-me" style="background:${me.avatar_color}">
        ${me.username.slice(0,2).toUpperCase()}
        <div class="mutedbadge">🔇</div>
      </div>
      <div class="call-av-name">You</div>
    </div>`;
  document.getElementById('call-overlay').classList.add('on');
}

async function endCall() {
  inCall = false;
  if (callId) {
    try { await insertSig({ type:'call-end', from_user:me.id }); } catch(e) {}
  }
  clearInterval(callTimer);
  clearInterval(signalPollTimer);
  Object.values(peers).forEach(pc => pc.close());
  peers = {};
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  document.getElementById('call-overlay').classList.remove('on');
  document.getElementById('remote-audios').innerHTML = '';
  callId = null;
  updateCallBtn();
  showToast('Call ended · ' + fmtTime(callSecs));
}

function updateCallBtn() {
  const b = document.getElementById('call-btn');
  b.textContent = inCall ? '📵 End call' : '📞 Call';
  b.className = inCall ? 'call-btn live' : 'call-btn';
}

function toggleMute() {
  muted = !muted;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !muted);
  const b = document.getElementById('mute-btn');
  b.textContent = muted ? '🔇' : '🎙️';
  b.classList.toggle('on', muted);
  const av = document.getElementById('cav-me');
  if (av) av.classList.toggle('is-muted', muted);
  showToast(muted ? 'Muted' : 'Unmuted');
}

function toggleSpeaker() {
  speakerOff = !speakerOff;
  document.querySelectorAll('#remote-audios audio').forEach(a => a.muted = speakerOff);
  const b = document.getElementById('spk-btn');
  b.textContent = speakerOff ? '🔇' : '🔊';
  b.classList.toggle('on', speakerOff);
  showToast(speakerOff ? 'Speaker off' : 'Speaker on');
}

function toggleMyMic() {
  if (inCall) toggleMute();
  else showToast('Mic toggles during an active call');
}

// ===================================================
//  UTILITIES
// ===================================================
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  document.getElementById('send-btn').disabled = !el.value.trim();
}

function escH(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/\n/g,'<br>');
}

function esc(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2,'0')}`;
}

let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('on'), 2600);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal.on').forEach(m => m.classList.remove('on'));
  }
});

// Close modals on backdrop click
document.querySelectorAll('.modal').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('on'); });
});

// ===================================================
//  START
// ===================================================
if (!SUPABASE_URL || SUPABASE_URL.includes('YOUR')) {
  document.getElementById('auth-error').textContent =
    '⚠️ Set your SUPABASE_URL and SUPABASE_KEY at the top of this file.';
  document.getElementById('auth-error').classList.add('show');
} else {
  tryAutoLogin();
}
</script>
