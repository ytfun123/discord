<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusChat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-app:#0f1117;--bg-sidebar:#1a1d27;--bg-main:#13161f;--bg-input:#1e2130;
  --bg-hover:#252840;--bg-msg-own:#2d3561;--accent:#6c7cff;--accent-soft:#3d4699;
  --text-hi:#e8eaf6;--text-md:#9fa3c8;--text-lo:#5a5f80;--border:#2a2d42;
  --green:#3dd68c;--red:#f05252;--radius:10px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-app);color:var(--text-hi);font-size:14px;line-height:1.5;height:100vh;overflow:hidden}

/* ===== AUTH ===== */
#auth-screen{position:fixed;inset:0;background:var(--bg-app);display:flex;align-items:center;justify-content:center;z-index:1000}
.auth-box{background:var(--bg-sidebar);border:1px solid var(--border);border-radius:16px;padding:36px;width:360px;display:flex;flex-direction:column;gap:20px}
.auth-logo{display:flex;align-items:center;gap:12px;justify-content:center}
.auth-logo-icon{width:44px;height:44px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#fff}
.auth-logo-name{font-size:22px;font-weight:700;color:var(--text-hi)}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);gap:0}
.auth-tab{flex:1;padding:10px;text-align:center;cursor:pointer;color:var(--text-lo);font-size:14px;font-weight:500;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.auth-field{display:flex;flex-direction:column;gap:6px}
.auth-field label{font-size:12px;font-weight:600;color:var(--text-lo);text-transform:uppercase;letter-spacing:.06em}
.auth-field input{background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text-hi);font-size:14px;outline:none;transition:border-color .15s}
.auth-field input:focus{border-color:var(--accent)}
.auth-field input::placeholder{color:var(--text-lo)}
.auth-btn{background:var(--accent);border:none;color:#fff;border-radius:10px;padding:12px;font-size:15px;font-weight:600;cursor:pointer;transition:background .15s}
.auth-btn:hover{background:#7d8cff}
.auth-btn:disabled{opacity:.5;cursor:not-allowed}
.auth-error{background:#2a1515;border:1px solid var(--red);border-radius:8px;padding:10px 14px;color:#f87171;font-size:13px;display:none}
.auth-error.show{display:block}

/* ===== APP ===== */
#app{display:none;height:100vh;width:100%}
.app{display:flex;height:100vh}

.sidebar{width:260px;min-width:260px;background:var(--bg-sidebar);display:flex;flex-direction:column;border-right:1px solid var(--border)}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.app-name{font-weight:600;font-size:15px}
.sidebar-search{padding:12px 14px;border-bottom:1px solid var(--border)}
.sidebar-search input{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text-hi);font-size:13px;outline:none}
.sidebar-search input:focus{border-color:var(--accent)}
.sidebar-search input::placeholder{color:var(--text-lo)}
.sidebar-section{padding:8px 0}
.section-label{padding:6px 14px;font-size:11px;font-weight:600;color:var(--text-lo);text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;justify-content:space-between}
.section-add{cursor:pointer;font-size:17px;line-height:1;transition:color .15s}
.section-add:hover{color:var(--accent)}
.channel-item{padding:7px 14px;cursor:pointer;border-radius:7px;margin:1px 8px;display:flex;align-items:center;gap:9px;transition:background .12s}
.channel-item:hover{background:var(--bg-hover)}
.channel-item.active{background:var(--accent-soft)}
.channel-item.active .ch-name{color:var(--text-hi)}
.ch-icon{font-size:15px;color:var(--text-lo);width:18px;text-align:center;flex-shrink:0}
.channel-item.active .ch-icon{color:#aab3ff}
.ch-name{color:var(--text-md);font-size:13.5px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-badge{background:var(--accent);color:#fff;border-radius:10px;font-size:11px;font-weight:600;padding:1px 6px;flex-shrink:0}
.dm-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;position:relative;color:#fff}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);position:absolute;bottom:0;right:0;border:2px solid var(--bg-sidebar)}
.sidebar-scroll{flex:1;overflow-y:auto}
.sidebar-scroll::-webkit-scrollbar{width:3px}
.sidebar-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sidebar-bottom{padding:12px 14px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.my-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0;position:relative;color:#fff}
.my-status{width:10px;height:10px;border-radius:50%;background:var(--green);border:2px solid var(--bg-sidebar);position:absolute;bottom:0;right:0}
.my-info{flex:1;overflow:hidden}
.my-name{font-size:13px;font-weight:600;color:var(--text-hi)}
.my-tag{font-size:11px;color:var(--text-lo)}
.icon-btn{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-lo);transition:background .12s,color .12s;border:none;background:transparent;font-size:15px}
.icon-btn:hover{background:var(--bg-hover);color:var(--text-hi)}

.main{flex:1;display:flex;flex-direction:column;background:var(--bg-main);min-width:0}
.chat-header{padding:0 20px;height:52px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0}
.chat-header-icon{font-size:18px;color:var(--text-lo)}
.chat-header-name{font-weight:600;font-size:15px;flex:1}
.chat-header-desc{font-size:12px;color:var(--text-lo)}
.header-actions{display:flex;gap:4px}
.call-btn{display:flex;align-items:center;gap:6px;background:var(--accent-soft);border:none;color:#aab3ff;border-radius:7px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:500;transition:background .15s}
.call-btn:hover{background:var(--accent)}

.messages-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:2px}
.messages-area::-webkit-scrollbar{width:4px}
.messages-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.day-divider{display:flex;align-items:center;gap:10px;margin:14px 0 10px;color:var(--text-lo);font-size:11px;font-weight:600;letter-spacing:.05em}
.day-divider::before,.day-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.msg-group{display:flex;gap:12px;padding:4px 6px;border-radius:8px;transition:background .1s}
.msg-group:hover{background:rgba(255,255,255,.02)}
.msg-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin-top:2px;color:#fff}
.msg-content{flex:1;min-width:0}
.msg-header{display:flex;align-items:baseline;gap:8px;margin-bottom:3px}
.msg-name{font-weight:600;font-size:13.5px}
.msg-time{font-size:11px;color:var(--text-lo)}
.msg-text{color:#cdd0eb;font-size:14px;line-height:1.55;word-break:break-word}
.msg-own .msg-group{flex-direction:row-reverse}
.msg-own .msg-header{flex-direction:row-reverse}
.msg-own .msg-text{background:var(--bg-msg-own);border-radius:12px 4px 12px 12px;padding:8px 12px;display:inline-block;max-width:420px;float:right;clear:both}
.empty-chat{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--text-lo)}
.typing-bar{height:28px;padding:0 20px;display:flex;align-items:center;gap:8px;color:var(--text-lo);font-size:12px;flex-shrink:0}
.typing-dots{display:flex;gap:4px;align-items:center}
.dot{width:5px;height:5px;border-radius:50%;background:var(--text-lo);animation:bounce .9s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

.input-area{padding:12px 20px 16px;flex-shrink:0}
.input-box{background:var(--bg-input);border:1px solid var(--border);border-radius:12px;display:flex;align-items:flex-end;gap:8px;padding:10px 12px;transition:border-color .15s}
.input-box:focus-within{border-color:var(--accent)}
.input-field{flex:1;background:transparent;border:none;outline:none;color:var(--text-hi);font-size:14px;resize:none;max-height:120px;min-height:22px;font-family:inherit;line-height:1.5}
.input-field::placeholder{color:var(--text-lo)}
.send-btn{width:32px;height:32px;border-radius:7px;background:var(--accent);border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,opacity .15s;font-size:14px}
.send-btn:hover{background:#7d8cff}
.send-btn:disabled{opacity:.35;cursor:not-allowed}

/* ===== CALL OVERLAY ===== */
.call-overlay{position:fixed;inset:0;background:rgba(10,11,18,.96);z-index:100;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
.call-overlay.active{display:flex}
.call-title{font-size:14px;color:var(--text-md)}
.call-name{font-size:28px;font-weight:700}
.call-status{font-size:13px;color:var(--text-lo)}
.call-avatars{display:flex;gap:16px}
.call-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;border:3px solid transparent}
.call-avatar.speaking{border-color:var(--green);box-shadow:0 0 0 3px rgba(61,214,140,.2)}
.call-controls{display:flex;gap:14px;margin-top:8px}
.call-ctrl{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;transition:opacity .15s}
.call-ctrl:hover{opacity:.8}
.call-ctrl.mute{background:#2a2d42;color:var(--text-hi)}
.call-ctrl.end{background:var(--red);color:#fff}

/* ===== MODAL ===== */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-box{background:#1e2130;border:1px solid var(--border);border-radius:16px;padding:24px;width:380px;display:flex;flex-direction:column;gap:16px}
.modal-title{font-size:17px;font-weight:700}
.modal-input{background:var(--bg-app);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text-hi);font-size:14px;outline:none;width:100%;font-family:inherit}
.modal-input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--text-md);border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px}
.btn-primary{background:var(--accent);border:none;color:#fff;border-radius:8px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600}
.btn-primary:hover{background:#7d8cff}
.type-select{display:flex;gap:10px}
.type-opt{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;cursor:pointer;text-align:center;font-size:13px;color:var(--text-md);transition:all .15s}
.type-opt.sel{border-color:var(--accent);background:var(--accent-soft);color:#aab3ff}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;right:24px;background:#1e2130;border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;z-index:999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.error{border-color:var(--red);color:#f87171}
.toast.success{border-color:var(--green);color:#6ee7b7}

.loading{display:flex;align-items:center;justify-content:center;gap:10px;color:var(--text-lo);font-size:13px;padding:20px}
</style>
</head>

<script>
// ===== STATE =====
let session = null; // { user: {id, username, avatar_color}, token }
let activeChat = null; // { type: 'channel'|'dm', id, name }
let channels = [];
let allUsers = [];
let dmList = []; // users we have DMs with
let pollTimer = null;
let lastMsgId = null;
let callSec = 0, callInt = null, inCall = false, muted = false;
let modalCtx = 'channel', newChType = 'text';

// ===== SUPABASE API =====
async function rpc(fn, params = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_SERVICE_KEY,
      'Authorization': `Bearer ${SUPABASE_SERVICE_KEY}`,
      'x-client-info': 'nexuschat'
    },
    body: JSON.stringify(params)
  });
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch(e) { throw new Error('Bad response: ' + text.slice(0,100)); }
  if (!res.ok) throw new Error(data.message || data.error || 'API error');
  return data;
}

// ===== AUTH =====
let authMode = 'login';
function switchTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (i === 0) === (mode === 'login')));
  document.getElementById('confirm-field').style.display = mode === 'register' ? 'flex' : 'none';
  document.getElementById('auth-submit').textContent = mode === 'login' ? 'Sign in' : 'Create account';
  hideAuthError();
}
function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg; el.classList.add('show');
}
function hideAuthError() { document.getElementById('auth-error').classList.remove('show'); }

async function submitAuth() {
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  const confirm = document.getElementById('auth-confirm').value;
  hideAuthError();
  if (!username || !password) return showAuthError('Please fill in all fields');
  if (username.length < 3) return showAuthError('Username must be at least 3 characters');
  if (password.length < 6) return showAuthError('Password must be at least 6 characters');
  if (authMode === 'register' && password !== confirm) return showAuthError('Passwords do not match');
  const btn = document.getElementById('auth-submit');
  btn.disabled = true; btn.textContent = authMode === 'login' ? 'Signing in…' : 'Creating account…';
  try {
    const fn = authMode === 'login' ? 'login_user' : 'register_user';
    const result = await rpc(fn, { p_username: username, p_password: password });
    if (result.error) { showAuthError(result.error); return; }
    session = result;
    localStorage.setItem('nexuschat_token', result.token);
    localStorage.setItem('nexuschat_user', JSON.stringify(result.user));
    await initApp();
  } catch(e) {
    showAuthError('Could not connect. Check your Supabase URL and key.');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Sign in' : 'Create account';
  }
}

async function tryAutoLogin() {
  const token = localStorage.getItem('nexuschat_token');
  if (!token) return;
  try {
    const result = await rpc('validate_session', { p_token: token });
    if (result.error) { localStorage.clear(); return; }
    session = { user: result.user, token };
    await initApp();
  } catch(e) { localStorage.clear(); }
}

function logout() {
  localStorage.clear();
  session = null;
  clearInterval(pollTimer);
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// ===== INIT =====
async function initApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  // Set user info
  const u = session.user;
  const initials = u.username.slice(0, 2).toUpperCase();
  const av = document.getElementById('my-avatar');
  av.style.background = u.avatar_color;
  av.textContent = initials;
  av.innerHTML += '<div class="my-status"></div>';
  document.getElementById('my-username').textContent = u.username;
  // Load channels
  await loadChannels();
  await loadUsers();
  // Set first channel active
  if (channels.length) setActive({ type: 'channel', id: channels[0].id, name: channels[0].name, desc: channels[0].description, icon: channels[0].type === 'voice' ? '🔊' : '#' });
  // Start polling
  pollTimer = setInterval(pollMessages, POLL_INTERVAL);
  // Keyboard shortcut
  document.getElementById('auth-username').addEventListener('keydown', e => { if(e.key==='Enter') submitAuth(); });
  document.getElementById('auth-password').addEventListener('keydown', e => { if(e.key==='Enter') submitAuth(); });
}

async function loadChannels() {
  // Fetch channels from Supabase directly
  const res = await fetch(`${SUPABASE_URL}/rest/v1/channels?order=created_at.asc`, {
    headers: { 'apikey': SUPABASE_SERVICE_KEY, 'Authorization': `Bearer ${SUPABASE_SERVICE_KEY}` }
  });
  channels = await res.json();
  renderChannels();
}

async function loadUsers() {
  const result = await rpc('get_users', { p_token: session.token });
  if (Array.isArray(result)) { allUsers = result; renderDMs(); }
}

// ===== RENDER SIDEBAR =====
function renderChannels() {
  document.getElementById('channels-list').innerHTML = channels.map(c => `
    <div class="channel-item${activeChat?.id === c.id ? ' active' : ''}" onclick="setChannelActive('${c.id}','${escAttr(c.name)}','${escAttr(c.description||'')}','${c.type}')">
      <div class="ch-icon">${c.type === 'voice' ? '🔊' : '#'}</div>
      <span class="ch-name">${escHTML(c.name)}</span>
    </div>`).join('');
}

function renderDMs() {
  // Show all users as potential DMs
  document.getElementById('dms-list').innerHTML = allUsers.map(u => `
    <div class="channel-item${activeChat?.id === 'dm-' + u.id ? ' active' : ''}" onclick="setDMActive('${u.id}','${escAttr(u.username)}','${u.avatar_color}')">
      <div class="dm-avatar" style="background:${u.avatar_color}">${u.username.slice(0,2).toUpperCase()}
        ${u.status === 'online' ? '<div class="online-dot"></div>' : ''}
      </div>
      <span class="ch-name">${escHTML(u.username)}</span>
    </div>`).join('');
}

// ===== NAVIGATION =====
function setChannelActive(id, name, desc, type) {
  setActive({ type: 'channel', id, name, desc, icon: type === 'voice' ? '🔊' : '#' });
}
function setDMActive(userId, username, color) {
  setActive({ type: 'dm', id: 'dm-' + userId, userId, name: username, icon: '💬', desc: 'Direct message' });
}

function setActive(chat) {
  activeChat = chat;
  lastMsgId = null;
  document.getElementById('header-icon').textContent = chat.icon;
  document.getElementById('header-name').textContent = chat.name;
  document.getElementById('header-desc').textContent = chat.desc || '';
  document.getElementById('msg-input').placeholder = `Message ${chat.type === 'dm' ? chat.name : '#' + chat.name}`;
  renderChannels(); renderDMs();
  loadMessages();
}

// ===== MESSAGES =====
async function loadMessages() {
  document.getElementById('messages-area').innerHTML = '<div class="loading">Loading…</div>';
  try {
    let result;
    if (activeChat.type === 'channel') {
      // Find channel UUID
      const ch = channels.find(c => c.id === activeChat.id || c.name === activeChat.name);
      if (!ch) return;
      activeChat.id = ch.id;
      result = await rpc('get_channel_messages', { p_token: session.token, p_channel_id: ch.id });
    } else {
      result = await rpc('get_direct_messages', { p_token: session.token, p_other_user_id: activeChat.userId });
    }
    renderMessages(Array.isArray(result) ? result : []);
  } catch(e) { showToast('Failed to load messages', 'error'); console.error(e); }
}

function renderMessages(msgs) {
  const area = document.getElementById('messages-area');
  if (!msgs.length) {
    area.innerHTML = `<div class="empty-chat"><div style="font-size:40px">💬</div><div>No messages yet — say hello!</div></div>`;
    return;
  }
  let html = '<div style="flex:1"></div><div class="day-divider">Messages</div>';
  msgs.forEach(m => {
    const isMe = m.sender.id === session.user.id;
    const initials = m.sender.username.slice(0, 2).toUpperCase();
    const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const av = `<div class="msg-avatar" style="background:${m.sender.avatar_color}">${initials}</div>`;
    if (isMe) {
      html += `<div class="msg-own"><div class="msg-group">${av}<div class="msg-content">
        <div class="msg-header"><span class="msg-name" style="color:var(--accent)">You</span><span class="msg-time">${time}</span></div>
        <div><span class="msg-text">${escHTML(m.content)}</span></div></div></div></div>`;
    } else {
      html += `<div class="msg-group">${av}<div class="msg-content">
        <div class="msg-header"><span class="msg-name" style="color:${m.sender.avatar_color}">${escHTML(m.sender.username)}</span><span class="msg-time">${time}</span></div>
        <div class="msg-text">${escHTML(m.content)}</div></div></div>`;
    }
  });
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

async function pollMessages() {
  if (!activeChat || !session) return;
  try {
    let result;
    if (activeChat.type === 'channel') {
      result = await rpc('get_channel_messages', { p_token: session.token, p_channel_id: activeChat.id });
    } else {
      result = await rpc('get_direct_messages', { p_token: session.token, p_other_user_id: activeChat.userId });
    }
    if (Array.isArray(result)) renderMessages(result);
  } catch(e) { /* silent poll fail */ }
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !session) return;
  input.value = ''; input.style.height = '';
  document.getElementById('send-btn').disabled = true;
  try {
    if (activeChat.type === 'channel') {
      await rpc('send_channel_message', { p_token: session.token, p_channel_id: activeChat.id, p_content: text });
    } else {
      await rpc('send_direct_message', { p_token: session.token, p_receiver_id: activeChat.userId, p_content: text });
    }
    await pollMessages();
  } catch(e) { showToast('Failed to send message', 'error'); input.value = text; }
}

// ===== MODALS =====
let userSearch = '';
function openModal(type) {
  modalCtx = type;
  document.getElementById('modal-title').textContent = type === 'channel' ? 'Create a channel' : 'Start a direct message';
  document.getElementById('type-select').style.display = type === 'channel' ? 'flex' : 'none';
  document.getElementById('modal-input').placeholder = type === 'channel' ? 'channel-name' : 'Search for a user…';
  document.getElementById('modal-input').value = '';
  const results = document.getElementById('user-search-results');
  results.style.display = type === 'dm' ? 'flex' : 'none';
  results.innerHTML = '';
  if (type === 'dm') {
    document.getElementById('modal-input').oninput = (e) => searchUsers(e.target.value);
    document.getElementById('modal-submit').textContent = 'Open DM';
    renderUserResults(allUsers);
  } else {
    document.getElementById('modal-input').oninput = null;
    document.getElementById('modal-submit').textContent = 'Create';
  }
  document.getElementById('modal').classList.add('active');
  setTimeout(() => document.getElementById('modal-input').focus(), 100);
}

function searchUsers(q) {
  const filtered = q ? allUsers.filter(u => u.username.toLowerCase().includes(q.toLowerCase())) : allUsers;
  renderUserResults(filtered);
}

let selectedUser = null;
function renderUserResults(users) {
  const el = document.getElementById('user-search-results');
  el.innerHTML = users.map(u => `
    <div onclick="selectUser('${u.id}','${escAttr(u.username)}','${u.avatar_color}')" style="display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid ${selectedUser?.id===u.id?'var(--accent)':'var(--border)'};background:${selectedUser?.id===u.id?'var(--accent-soft)':'transparent'};transition:all .12s">
      <div class="dm-avatar" style="background:${u.avatar_color};position:relative">${u.username.slice(0,2).toUpperCase()}</div>
      <span style="color:var(--text-hi)">${escHTML(u.username)}</span>
    </div>`).join('') || '<div style="color:var(--text-lo);font-size:13px;padding:8px">No users found</div>';
}

function selectUser(id, username, color) {
  selectedUser = { id, username, color };
  document.getElementById('modal-input').value = username;
  renderUserResults(allUsers);
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  selectedUser = null;
}

async function submitModal() {
  if (modalCtx === 'dm') {
    if (!selectedUser) { showToast('Select a user first', 'error'); return; }
    closeModal();
    setDMActive(selectedUser.id, selectedUser.username, selectedUser.color);
    return;
  }
  const name = document.getElementById('modal-input').value.trim().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
  if (!name) { showToast('Enter a channel name', 'error'); return; }
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/channels`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json', 'Prefer': 'return=representation',
        'apikey': SUPABASE_SERVICE_KEY, 'Authorization': `Bearer ${SUPABASE_SERVICE_KEY}`
      },
      body: JSON.stringify({ name, type: newChType, description: name, created_by: session.user.id })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.message); }
    const [ch] = await res.json();
    channels.push(ch);
    closeModal();
    renderChannels();
    setChannelActive(ch.id, ch.name, ch.description, ch.type);
    showToast(`#${ch.name} created!`, 'success');
  } catch(e) { showToast(e.message || 'Failed to create channel', 'error'); }
}

let chType = 'text';
function setChType(t, el) { chType = t; newChType = t; document.querySelectorAll('.type-opt').forEach(e => e.classList.remove('sel')); el.classList.add('sel'); }

// ===== CALL =====
function startCall() {
  if (inCall) { endCall(); return; }
  inCall = true;
  document.getElementById('call-room-name').textContent = activeChat?.name || 'Call';
  document.getElementById('call-timer').textContent = 'Calling…';
  document.getElementById('call-overlay').classList.add('active');
  const u = session.user;
  document.getElementById('call-avatars').innerHTML =
    `<div class="call-avatar speaking" style="background:${u.avatar_color}">${u.username.slice(0,2).toUpperCase()}</div>`;
  callSec = 0;
  setTimeout(() => {
    document.getElementById('call-timer').textContent = '0:00';
    callInt = setInterval(() => {
      callSec++;
      const m = Math.floor(callSec / 60), s = callSec % 60;
      document.getElementById('call-timer').textContent = `${m}:${String(s).padStart(2,'0')}`;
    }, 1000);
  }, 1000);
}
function endCall() {
  inCall = false; clearInterval(callInt);
  document.getElementById('call-overlay').classList.remove('active');
  showToast('Call ended · ' + document.getElementById('call-timer').textContent);
}
function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🎙️';
  document.getElementById('mute-btn').style.background = muted ? 'var(--red)' : '#2a2d42';
}

// ===== UTILS =====
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function handleInput(el) {
  el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  document.getElementById('send-btn').disabled = !el.value.trim();
}
function filterSidebar(q) {
  q = q.toLowerCase();
  document.querySelectorAll('.channel-item').forEach(el => {
    el.style.display = el.querySelector('.ch-name').textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
function escHTML(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function escAttr(s) { return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;') }

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); if (inCall) endCall(); }
});
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});

// ===== BOOT =====
if (SUPABASE_URL.includes('YOUR_PROJECT')) {
  document.getElementById('auth-error').textContent = '⚠️ Please set your SUPABASE_URL and SUPABASE_SERVICE_KEY in the script tag at the top of this file.';
  document.getElementById('auth-error').classList.add('show');
} else {
  tryAutoLogin();
}
</script>
